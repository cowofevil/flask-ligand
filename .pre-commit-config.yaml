repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-yaml
    -   id: check-toml
    -   id: detect-private-key
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
-   repo: https://github.com/rcmdnk/pyproject-pre-commit
    rev: v0.6.0
    hooks:
    -   id: black
    -   id: isort
    -   id: flake8
    -   id: mypy
    -   id: validate-pyproject
